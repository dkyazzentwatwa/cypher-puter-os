name: Release firmware

# Builds the Cardputer ADV launcher, all public app binaries, the SD-card
# package, the generated catalog, and the build report for every v* release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach assets to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - name: Install Arduino CLI
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh \
            | BINDIR="$HOME/bin" sh
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Install Python dependencies
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml

      - name: Checkout release app workspace
        run: |
          python3 tools/checkout-release-workspace.py

      - name: Install Arduino platforms and libraries
        run: |
          python3 tools/install-release-deps.py

      - name: Prepare release bundle
        env:
          CYPHER_OS_RELEASE_VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          ./tools/prepare-release.sh "${CYPHER_OS_RELEASE_VERSION}"
          ls -lah dist/release

      - name: Attach launcher and SD bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Cypher OS ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Cypher OS release bundle for the M5Stack Cardputer ADV.

            Quick install:

            1. Flash `cypher-os-launcher.bin` to the Cardputer ADV.
            2. Unzip `cypher-os-sd-card.zip` to the root of a FAT32 microSD card.
            3. Insert the SD card, boot the Cardputer, and pick an app from the catalog.

            Included assets:

            - `cypher-os-launcher.bin`: merged one-file launcher image.
            - `cypher-os-sd-card.zip`: SD card catalog, app binaries, and bundled SD folders.
            - `apps.json`: generated public app catalog.
            - `BUILD_REPORT.md`: source commits, binary sizes, and release build status.
          files: |
            dist/release/cypher-os-launcher.bin
            dist/release/cypher-os-sd-card.zip
            dist/release/apps.json
            dist/release/BUILD_REPORT.md
          fail_on_unmatched_files: true
