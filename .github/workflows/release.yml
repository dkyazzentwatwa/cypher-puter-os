name: Release firmware

# Publishes the committed Cardputer ADV launcher, SD-card package, generated
# catalog, and build report for every v* release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to attach assets to (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}
          submodules: recursive

      - name: Validate committed release bundle
        env:
          CYPHER_OS_RELEASE_VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          test -f dist/release/cypher-os-launcher.bin
          test -f dist/release/cypher-os-sd-card.zip
          test -f dist/release/apps.json
          test -f dist/release/BUILD_REPORT.md
          python3 tools/validate-catalog.py config/apps.json --manifest dist/release/apps.json --dist dist/apps
          python3 - "${CYPHER_OS_RELEASE_VERSION}" <<'PY'
          import json
          import sys
          import zipfile

          expected = sys.argv[1]
          with open("dist/release/apps.json", "r", encoding="utf-8") as handle:
              manifest = json.load(handle)
          if manifest.get("release_version") != expected:
              raise SystemExit(f"release_version {manifest.get('release_version')} does not match {expected}")

          ready = [app for app in manifest.get("apps", []) if app.get("status") == "ready"]
          with zipfile.ZipFile("dist/release/cypher-os-sd-card.zip") as archive:
              names = archive.namelist()
              bins = [name for name in names if name.startswith("cypher-puter/apps/") and name.endswith(".bin")]
              required = {
                  "cypher-puter/apps/apps.json",
                  "cardputer-game-os/saves/",
              }
              missing = sorted(required - set(names))
              if missing:
                  raise SystemExit(f"SD zip missing required paths: {missing}")
              if len(bins) != len(ready):
                  raise SystemExit(f"SD zip has {len(bins)} bins but manifest has {len(ready)} ready apps")

          print(f"release bundle ok: {expected}, {len(ready)} ready apps")
          PY
          ls -lah dist/release

      - name: Attach launcher and SD bundle to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: Cypher OS ${{ github.event.inputs.tag || github.ref_name }}
          body: |
            Cypher OS release bundle for the M5Stack Cardputer ADV.

            Quick install:

            1. Flash `cypher-os-launcher.bin` to the Cardputer ADV.
            2. Unzip `cypher-os-sd-card.zip` to the root of a FAT32 microSD card.
            3. Insert the SD card, boot the Cardputer, and pick an app from the catalog.

            Included assets:

            - `cypher-os-launcher.bin`: merged one-file launcher image.
            - `cypher-os-sd-card.zip`: SD card catalog, app binaries, and bundled SD folders.
            - `apps.json`: generated public app catalog.
            - `BUILD_REPORT.md`: source commits, binary sizes, and release build status.
          files: |
            dist/release/cypher-os-launcher.bin
            dist/release/cypher-os-sd-card.zip
            dist/release/apps.json
            dist/release/BUILD_REPORT.md
          fail_on_unmatched_files: true
